name: Publish npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no upload)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  publish:
    name: Publish @ralph-rlm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: |
          bun --cwd=packages/engine run build
          bun --cwd=packages/worker-plugin run build
          bun --cwd=packages/provider run build
          bun build .opencode/plugins-legacy/ralph-rlm.ts \
            --outfile dist/ralph-rlm.js \
            --target bun \
            --format esm \
            --external @opencode-ai/plugin

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            bun run bin/publish-npm.ts --dry-run
          else
            bun run bin/publish-npm.ts
          fi